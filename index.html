<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOS Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:"Segoe UI",sans-serif;background:#000}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:-1}
.menu{position:absolute;left:30px;top:80px;width:280px;display:flex;flex-direction:column;gap:12px}
.logo{
  color:white;font-size:28px;font-weight:900;margin-bottom:12px;
  text-shadow:0 0 10px rgba(255,255,255,.6),0 0 20px rgba(255,255,255,.4)
}
.menu a{
  text-decoration:none;color:white;padding:14px 18px;border-radius:14px;
  background:rgba(8,25,45,.75);backdrop-filter:blur(8px);
  border:1px solid rgba(120,212,255,.35);transition:.2s
}
.menu a:hover{transform:translateX(5px);border-color:#ffc34a}
.title{font-size:18px;font-weight:800}
.desc{margin-top:4px;font-size:12px;color:#b8dfff}
@media (max-width:768px){
  .menu{left:15px;top:60px;width:250px}
  .logo{font-size:22px}
}
</style>
</head>
<body>
<video autoplay muted loop playsinline>
  <source src="background.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<div class="menu">
  <div class="logo">WOS Tools</div>
  <a href="https://kekj12kek-sudo.github.io/wos-hero-gear-planner/">
    <div class="title">英雄装備コスト計算</div>
    <div class="desc">神話装備・精錬鍛造・配能計算</div>
  </a>
  <a href="https://kekj12kek-sudo.github.io/wos-lord-gem-planner/">
    <div class="title">宝石・領主装備コスト計算</div>
    <div class="desc">宝石LvUP・領主装備強化</div>
  </a>
</div>
</body>
</html>
